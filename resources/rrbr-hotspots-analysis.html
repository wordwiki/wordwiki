const catchmentM = 500;

function scoreColor(norm) {
  // Red (high) to yellow (mid) to transparent (low)
  const r = Math.round(200 + 55 * norm);
  const g = Math.round(200 * (1 - norm));
  const b = 30;
  return `rgb(${r},${g},${b})`;
}

const map = L.map('map').setView([43.45019, -80.49972], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors',
  maxZoom: 18,
}).addTo(map);

// DA polygons — individual DA scores, shows where kids actually live
// Build a lookup so hotspot hover can highlight cluster DAs
const daLayers = {};
const polyLayer = L.geoJSON(daPolygons, {
  style: function(feature) {
    const norm = feature.properties.score_norm || 0;
    // DAs below the cutoff (added for cluster hover) get a minimal style
    const belowCutoff = feature.properties.score < 3.0;
    return {
      fillColor: belowCutoff ? '#ccc' : scoreColor(norm),
      fillOpacity: belowCutoff ? 0.1 : 0.4 + norm * 0.35,
      weight: belowCutoff ? 0.5 : 1,
      color: belowCutoff ? '#aaa' : '#666',
      opacity: belowCutoff ? 0.3 : 0.5,
    };
  },
  onEachFeature: function(feature, layer) {
    const p = feature.properties;
    daLayers[p.da_code] = layer;
    // Store original style for reset after hover
    const belowCutoff = p.score < 3.0;
    const norm = p.score_norm || 0;
    layer._origStyle = {
      fillColor: belowCutoff ? '#ccc' : scoreColor(norm),
      fillOpacity: belowCutoff ? 0.1 : 0.4 + norm * 0.35,
      weight: belowCutoff ? 0.5 : 1,
      color: belowCutoff ? '#aaa' : '#666',
      opacity: belowCutoff ? 0.3 : 0.5,
    };
    layer.bindPopup(
      `<strong>DA ${p.da_code}</strong> — ${p.city}<br>`
      + `Score: ${p.score}<br>`
      + `Children: ${p.children_pct || '?'}% (${p.kids || '?'} kids / ${p.population || '?'} people)<br>`
      + `Low income: ${p.low_income_pct || '?'}%<br>`
      + `Immigrants: ${p.immigrants || '?'} · First gen: ${p.first_gen || '?'}<br>`
      + `Newcomer families: ${p.first_gen_x_children || '?'}`
    );
  },
});
polyLayer.addTo(map);

// Helper: highlight/unhighlight a set of DA polygons
function highlightDAs(daCodes) {
  daCodes.forEach(code => {
    const layer = daLayers[code];
    if (layer) {
      layer.setStyle({ fillColor: '#2196F3', fillOpacity: 0.5, weight: 2, color: '#1565C0', opacity: 0.8 });
      layer.bringToFront();
    }
  });
}
function unhighlightDAs(daCodes) {
  daCodes.forEach(code => {
    const layer = daLayers[code];
    if (layer && layer._origStyle) {
      layer.setStyle(layer._origStyle);
    }
  });
}

// Hotspot markers with numbered icons
const hotspotLayer = L.layerGroup();
hotspots.forEach(h => {
  const icon = L.divIcon({
    className: '',
    html: `<div class="hotspot-icon">${h.rank}</div>`,
    iconSize: [24, 24],
    iconAnchor: [12, 12],
  });
  const marker = L.marker([h.lat, h.lon], { icon }).addTo(hotspotLayer);
  marker.on('mouseover', function() { highlightDAs(h.cluster_da_codes || []); });
  marker.on('mouseout', function() { unhighlightDAs(h.cluster_da_codes || []); });
  const daLabel = h.cluster_das > 1
    ? `${h.cluster_das} census areas around DA ${h.da_code}`
    : `DA ${h.da_code}`;
  marker.bindPopup(
    `<strong>#${h.rank}. ${daLabel}</strong><br>`
    + `${h.city} · Score: ${h.score}<br>`
    + `Children: ${h.children_pct}% (${h.kids} kids / ${h.population} people)<br>`
    + `Low income: ${h.low_income_pct}%<br>`
    + `Newcomer families: ${h.first_gen_x_children}`
  );
  L.circle([h.lat, h.lon], {
    radius: catchmentM,
    color: '#d32f2f',
    weight: 1,
    fillOpacity: 0.05,
    interactive: false,
  }).addTo(hotspotLayer);
});
hotspotLayer.addTo(map);

// Venue markers — on a higher pane so they aren't occluded by polygons
map.createPane('venues');
map.getPane('venues').style.zIndex = 650;
const venueColors = {
  'known good': '#28a745',
  'known middle': '#ffc107',
  'known bad': '#dc3545',
  '': '#6c757d',
};
const venueLayer = L.layerGroup();
venues.forEach(v => {
  const color = venueColors[v.status] || '#6c757d';
  L.circleMarker([v.lat, v.lon], {
    radius: 7,
    fillColor: color,
    fillOpacity: 0.9,
    color: 'white',
    weight: 2,
    pane: 'venues',
  }).bindPopup(
    `<strong>${v.name}</strong><br>${v.type}`
    + (v.status ? `<br>${v.status}` : '')
  ).addTo(venueLayer);
});
venueLayer.addTo(map);

// Layer control
L.control.layers(null, {
  'Need areas': polyLayer,
  'Top Hotspots (catchment-scored)': hotspotLayer,
  'Existing Venues': venueLayer,
}).addTo(map);

// Legend
const legend = L.control({ position: 'bottomright' });
legend.onAdd = function() {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = `
    <h4>Legend</h4>
    <span class="legend-swatch" style="background:${scoreColor(1.0)}"></span> High need area<br>
    <span class="legend-swatch" style="background:${scoreColor(0.5)}"></span> Medium need area<br>
    <span class="legend-swatch" style="background:${scoreColor(0.0)}"></span> Lower need area<br>
    <span class="legend-dot" style="background:#d32f2f"></span> Hotspot (numbered)<br>
    <span class="legend-dot" style="background:#28a745"></span> Venue: known good<br>
    <span class="legend-dot" style="background:#ffc107"></span> Venue: known middle<br>
    <span class="legend-dot" style="background:#dc3545"></span> Venue: known bad<br>
    <span class="legend-dot" style="background:#6c757d"></span> Venue: untried
  `;
  return div;
};
legend.addTo(map);
</script>
