<head>

    <style>

     #annotatedPage {
         position:relative; display:inline-block;
     }

     #annotatedPage svg {
        position:absolute; top:0; left:0;
     }

     .group > rect.segment {
         fill-opacity: 10%;
         stroke-width:3;
         stroke:green;
     }

     .group:hover > rect.segment {
         stroke:red;
     }

     .group.active > rect.segment {
         stroke-width:3;
         stroke:purple;
     }

    .tooltip {
        background-color: beige;
        overflow: scroll;
        resize: both;
        padding-left: 5px;
        padding-right: 5px;
        width: 200px;
        height: 160px;
    }

    </style>

    <script>
    
    const DEFAULT_TOOLTIP_WIDTH = 200;
    const DEFAULT_TOOLTIP_HEIGHT = 160;
    function activate_group() {
        const group_elem = event.currentTarget;
        document.addEventListener('dragover', function(e) { e.preventDefault() })

        // console.info(`activate group ${group_elem.id}`);

        const current_active_group_elem = document.querySelector('#annotatedPage svg .group.active');
        if (current_active_group_elem) {
            console.info(`deactivating group ${current_active_group_elem.id}`);
            current_active_group_elem.classList.remove('active');
            const currentActiveTooltip = document.querySelector(`#${current_active_group_elem.id}-tooltip`);
            if (currentActiveTooltip) {
                currentActiveTooltip.style.display = 'none';
            }
        }
        
        group_elem.classList.add('active');

        const tooltip = document.querySelector(`#${group_elem.id}-tooltip`);
        // console.info(`tooltip ${tooltip.id}`);
        if (tooltip) {
            const annotatedPage = document.querySelector('#annotatedPage');
            const annotatedPageTop = annotatedPage.getBoundingClientRect().top;
            const annotatedPageLeft = annotatedPage.getBoundingClientRect().left;

            tooltip.style.display = 'block'; 
            tooltip.style.position = 'absolute';

            const default_top = event.pageY - annotatedPageTop - document.body.scrollTop;
            const default_left = event.pageX - annotatedPageLeft - document.body.scrollLeft;

            tooltip.style.top = default_top;
            tooltip.style.left = Math.min(default_left, annotatedPage.scrollWidth - DEFAULT_TOOLTIP_WIDTH);

            tooltip.addEventListener("dragend", (e) => {
                if (e.pageX == 0 || e.pageY == 0) {
                    return;
                }
                // console.info(`drag ${e.pageX} ${e.pageY}`);
                tooltip.style.top = e.pageY - annotatedPageTop - document.body.scrollTop;
                tooltip.style.left = e.pageX  - annotatedPageLeft - document.body.scrollLeft;
            });
        }


    }

    </script>

</head>

<body>

    <h1>Sample Page</h1>
    
    <div id="annotatedPage">
        
        <img src="01R_P9S16SS1P1_050.jpg" width="982" height="1500">
        <svg width="982" height="1500">

            <svg class="group" id="puppy" onclick="activate_group()">
                <rect class="segment" x="35" y="340" width="590" height="30" />
                <rect class="segment" x="630" y="340" width="300" height="60"/>
            </svg>

            <svg class="group" id="cat" onclick="activate_group()">
                <rect class="segment" x="35" y="340" width="30" height="100" />
            </svg>

            <svg class="group" id="mouse" onclick="activate_group()">
                <rect class="segment" x="35" y="375" width="590" height="40" />
            </svg>
            
        </svg>
        <div id="puppy-tooltip" class='tooltip' style="display: none;" draggable="true">
            <p> puppy <p>
        </div>
        <div id="cat-tooltip" class='tooltip' style="display: none;" draggable="true">
            <p> cat <p>
        </div>
        <div id="mouse-tooltip" class='tooltip' style="display: none;" draggable="true">
            <p> mouse <p>
        </div>
    </div>
</body>
